<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F1EB;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    font-weight:800;
    font-size:18px;
}

.nav-links a {
    margin-left: 15px;
    color: #333;
    text-decoration: none;
    font-size:13px;
}

.container{
    padding:30px 20px;
    max-width:1400px;
    margin:0 auto;
}

h2{
    margin-bottom:20px;
    font-size:24px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.stat-card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat-card h3{
    font-size:12px;
    color:#777;
}

.stat-card p{
    font-size:18px;
    font-weight:700;
    margin-top:8px;
}

.charts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.chart-box{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.chart-box h3{
    margin-bottom:15px;
    font-size:14px;
}

canvas {
    max-width: 100%;
}

@media (max-width: 900px){
    .charts{
        grid-template-columns:1fr;
    }

    .chart-box{
        padding:15px;
    }
}

@media (max-width: 600px){
.container{
    padding:20px 10px;
}

h2{
    font-size:18px;
}

.stats{
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.stat-card{
    padding:12px;
}

.stat-card h3{
    font-size:11px;
}

.stat-card p{
    font-size:16px;
}

.charts{
    grid-template-columns:1fr;
    gap:15px;
}

.chart-box{
    padding:10px;
}

.chart-box h3{
    font-size:12px;
}

.nav-links a {
    margin-left: 10px;
    font-size:12px;
}
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ADMIN PANEL</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="userdash.html">User Dashboard</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Analytics Dashboard</h2>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <h3>Total Revenue</h3>
            <p>₹12,45,000</p>
        </div>

        <div class="stat-card">
            <h3>Total Bookings</h3>
            <p>542</p>
        </div>

        <div class="stat-card">
            <h3>Active Rentals</h3>
            <p>37</p>
        </div>

        <div class="stat-card">
            <h3>High Demand City</h3>
            <p>Delhi 🔥</p>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="charts">

        <div class="chart-box">
            <h3>Monthly Revenue</h3>
            <canvas id="revenueChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Car Popularity</h3>
            <canvas id="carChart"></canvas>
        </div>

    </div>

</div>

<script>

// Revenue Chart
const revenueCtx = document.getElementById('revenueChart');

new Chart(revenueCtx, {
    type: 'line',
    data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun'],
        datasets: [{
            label: 'Revenue',
            data: [120000, 180000, 150000, 220000, 250000, 300000],
            borderColor: '#E6A93E',
            backgroundColor: 'rgba(230,169,62,0.2)',
            tension: 0.4
        }]
    }
});

// Car Popularity Chart
const carCtx = document.getElementById('carChart');

new Chart(carCtx, {
    type: 'bar',
    data: {
        labels: ['Creta','XUV700','Nexon','BMW','Mustang'],
        datasets: [{
            label: 'Bookings',
            data: [120, 95, 150, 60, 40],
            backgroundColor: '#111'
        }]
    }
});

</script>

</body>
</html>
