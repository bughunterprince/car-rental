<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F1EB;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    font-weight:800;
    font-size:18px;
}

.nav-links a{
    text-decoration:none;
    margin-left:20px;
    color:#333;
    font-size:13px;
}

/* MAIN SECTION */
.container{
    display:flex;
    flex-direction:row;
    padding:30px 20px;
    gap:30px;
    max-width:1200px;
    margin:0 auto;
}

/* IMAGE */
.car-image{
    width:50%;
    flex-shrink:0;
}

.car-image img{
    width:100%;
    border-radius:10px;
    object-fit:cover;
}

/* DETAILS */
.details{
    width:50%;
    flex:1;
}

.details h2{
    font-size:28px;
    margin-bottom:15px;
}

.specs{
    margin:15px 0;
}

.specs div{
    margin-bottom:10px;
    color:#555;
    font-size:14px;
}

.price{
    font-size:16px;
    margin-top:15px;
}

.ai-price{
    color:#E6A93E;
    font-weight:700;
    margin-top:5px;
    font-size:20px;
}

/* DEMAND BAR */
.demand{
    margin-top:15px;
}

.demand p{
    font-size:13px;
    margin-bottom:8px;
}

.bar{
    height:8px;
    width:100%;
    background:#ddd;
    border-radius:5px;
    overflow:hidden;
}

.bar-fill{
    height:100%;
    background:linear-gradient(90deg,#E6A93E,#d89b2d);
    width:75%;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    border:none;
    font-size:14px;
    transition:0.3s;
}

.btn:hover{
    background:#333;
}

@media (max-width: 900px){
.container{
    flex-direction:column;
    gap:20px;
}

.car-image{
    width:100%;
}

.details{
    width:100%;
}
}

@media (max-width: 600px){
.container{
    padding:20px 15px;
    gap:15px;
}

.details h2{
    font-size:20px;
}

.specs div{
    font-size:13px;
}

.price{
    font-size:14px;
}

.ai-price{
    font-size:18px;
}

.demand p{
    font-size:12px;
}

.btn{
    width:100%;
    padding:10px;
    font-size:14px;
}

.nav-links a{
    margin-left:10px;
    font-size:12px;
}
}
    height:100%;
    width:70%;
    background:#E6A93E;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 25px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:600;
}

.btn:hover{
    opacity:0.8;
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .car-image, .details{
        width:100%;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">RENTAL</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cars.html">Cars</a>
        <a href="userdash.html">Dashboard</a>
    </div>
</div>

<div class="container">

    <!-- IMAGE -->
    <div class="car-image">
        <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
    </div>

    <!-- DETAILS -->
    <div class="details">
        <h2>Hyundai Creta (SUV)</h2>

        <div class="specs">
            <div>✔ Fuel Type: Petrol</div>
            <div>✔ Transmission: Automatic</div>
            <div>✔ Seats: 5</div>
            <div>✔ Mileage: 18 km/l</div>
            <div>✔ AC: Yes</div>
        </div>

        <div class="price">Base Price: ₹2800/day</div>
        <div class="ai-price">AI Suggested Price: ₹3200/day</div>

        <div class="demand">
            <p style="margin-bottom:8px;">🔥 Demand Level: High</p>
            <div class="bar">
                <div class="bar-fill"></div>
            </div>
        </div>

        <a href="booking.html" class="btn">Book Now</a>
    </div>

</div>

</body>
</html>
