<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Premium Car Rental</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F1EB;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:400px;
    padding:30px 20px;
    border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:700;
    font-size:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#E6A93E;
    box-shadow:0 0 5px rgba(230,169,62,0.3);
}

button{
    width:100%;
    padding:12px;
    background:#E6A93E;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

button:hover{
    background:#d89b2d;
}

button:active{
    transform:scale(0.98);
}

p{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

a{
    color:#E6A93E;
    text-decoration:none;
    font-weight:600;
}

.separator{
    text-align:center;
    margin:10px 0;
    font-size:11px;
    color:#777;
}

.camera-wrap{
    border:1px solid #ddd;
    border-radius:8px;
    padding:8px;
    margin-bottom:8px;
    overflow:hidden;
}

video, canvas{
    width:100%;
    border-radius:6px;
    background:#111;
    display:block;
}

.btn-muted{
    background:#222;
    color:#fff;
    margin-bottom:8px;
}

.btn-muted:hover{
    background:#444;
}

@media (max-width: 600px){
.container{
    padding:20px 15px;
}

h2{
    font-size:18px;
    margin-bottom:20px;
}

input{
    padding:10px;
    font-size:16px;
    margin-bottom:10px;
}

button{
    padding:10px;
    font-size:14px;
}

p{
    font-size:12px;
}

.separator{
    font-size:10px;
    margin:8px 0;
}

.camera-wrap{
    padding:5px;
    margin-bottom:5px;
}

.btn-muted{
    margin-bottom:5px;
}
}

.btn-muted:hover{
    background:#000;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form onsubmit="handleLogin(event)">
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="separator">OR LOGIN WITH FACE</div>

    <form id="faceLoginForm" onsubmit="handleFaceLogin(event)">
        <div class="camera-wrap">
            <video id="loginVideo" autoplay playsinline></video>
            <canvas id="loginCanvas" style="display:none;"></canvas>
        </div>
        <button type="button" class="btn-muted" id="captureFaceBtn">Capture Face</button>
        <button type="submit">Login With Face</button>
    </form>

    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
const loginVideo = document.getElementById("loginVideo");
const loginCanvas = document.getElementById("loginCanvas");
const captureFaceBtn = document.getElementById("captureFaceBtn");

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        loginVideo.srcObject = stream;
    } catch (error) {
        console.error("Camera access failed", error);
    }
}

captureFaceBtn.addEventListener("click", () => {
    if (!loginVideo.videoWidth || !loginVideo.videoHeight) {
        alert("Camera not ready");
        return;
    }

    loginCanvas.width = loginVideo.videoWidth;
    loginCanvas.height = loginVideo.videoHeight;
    const context = loginCanvas.getContext("2d");
    context.drawImage(loginVideo, 0, 0, loginCanvas.width, loginCanvas.height);
    captureFaceBtn.textContent = "Face Captured ✓";
});

function handleLogin(e) {
    e.preventDefault();
    alert("Demo login successful! Redirecting to dashboard...");
    setTimeout(() => window.location.href = "userdash.html", 1000);
}

function handleFaceLogin(e) {
    e.preventDefault();
    if (captureFaceBtn.textContent.includes("Captured")) {
        alert("Demo face login successful! Redirecting to dashboard...");
        setTimeout(() => window.location.href = "userdash.html", 1000);
    } else {
        alert("Please capture your face first");
    }
}

startCamera();
</script>

</body>
</html>
