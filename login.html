<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Premium Car Rental</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F1EB;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:400px;
    padding:40px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#E6A93E;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#d89b2d;
}

p{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

a{
    color:#E6A93E;
    text-decoration:none;
    font-weight:600;
}

.messages{
    margin-bottom:16px;
}

.message{
    padding:10px 12px;
    border-radius:6px;
    font-size:13px;
    margin-bottom:8px;
}

.message.error{
    background:#fde7e7;
    color:#b12a2a;
}

.message.success{
    background:#e8f7eb;
    color:#246b35;
}

.separator{
    text-align:center;
    margin:14px 0;
    font-size:12px;
    color:#777;
}

.camera-wrap{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

video, canvas{
    width:100%;
    border-radius:6px;
    background:#111;
}

.btn-muted{
    background:#222;
    color:#fff;
    margin-bottom:10px;
}

.btn-muted:hover{
    background:#000;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="/login/">
        {% csrf_token %}
        <input type="hidden" name="login_mode" value="password">
        <input type="email" name="username" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="separator">OR LOGIN WITH FACE</div>

    <form method="post" action="/login/" id="faceLoginForm">
        {% csrf_token %}
        <input type="hidden" name="login_mode" value="face">
        <input type="hidden" name="face_image" id="faceLoginImage" required>
        <div class="camera-wrap">
            <video id="loginVideo" autoplay playsinline></video>
            <canvas id="loginCanvas" style="display:none;"></canvas>
        </div>
        <button type="button" class="btn-muted" id="captureFaceBtn">Capture Face</button>
        <button type="submit">Login With Face</button>
    </form>

    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
const loginVideo = document.getElementById("loginVideo");
const loginCanvas = document.getElementById("loginCanvas");
const captureFaceBtn = document.getElementById("captureFaceBtn");
const faceLoginImage = document.getElementById("faceLoginImage");

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        loginVideo.srcObject = stream;
    } catch (error) {
        console.error("Camera access failed", error);
    }
}

captureFaceBtn.addEventListener("click", () => {
    const width = loginVideo.videoWidth;
    const height = loginVideo.videoHeight;
    if (!width || !height) {
        return;
    }

    loginCanvas.width = width;
    loginCanvas.height = height;
    const context = loginCanvas.getContext("2d");
    context.drawImage(loginVideo, 0, 0, width, height);
    faceLoginImage.value = loginCanvas.toDataURL("image/jpeg");
    captureFaceBtn.textContent = "Face Captured";
});

startCamera();
</script>

</body>
</html>
