<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Premium Car Rental</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F1EB;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:400px;
    padding:40px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

input, select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#E6A93E;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#d89b2d;
}

p{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

a{
    color:#E6A93E;
    text-decoration:none;
    font-weight:600;
}

.messages{
    margin-bottom:16px;
}

.message{
    padding:10px 12px;
    border-radius:6px;
    font-size:13px;
    margin-bottom:8px;
}

.message.error{
    background:#fde7e7;
    color:#b12a2a;
}

.message.success{
    background:#e8f7eb;
    color:#246b35;
}

.camera-wrap{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

video, canvas{
    width:100%;
    border-radius:6px;
    background:#111;
}

.hint{
    font-size:12px;
    color:#666;
    margin:8px 0 12px;
}

.btn-muted{
    background:#222;
    color:#fff;
    margin-bottom:10px;
}

.btn-muted:hover{
    background:#000;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="/register/">
        {% csrf_token %}
        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <input type="hidden" name="face_image" id="faceRegisterImage">
        <div class="camera-wrap">
            <video id="registerVideo" autoplay playsinline></video>
            <canvas id="registerCanvas" style="display:none;"></canvas>
        </div>
        <div class="hint">Capture face once to enable AI face login later.</div>
        <button type="button" class="btn-muted" id="captureRegisterFaceBtn">Capture Face For Login</button>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
const registerVideo = document.getElementById("registerVideo");
const registerCanvas = document.getElementById("registerCanvas");
const captureRegisterFaceBtn = document.getElementById("captureRegisterFaceBtn");
const faceRegisterImage = document.getElementById("faceRegisterImage");

async function startRegisterCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        registerVideo.srcObject = stream;
    } catch (error) {
        console.error("Camera access failed", error);
    }
}

captureRegisterFaceBtn.addEventListener("click", () => {
    const width = registerVideo.videoWidth;
    const height = registerVideo.videoHeight;
    if (!width || !height) {
        return;
    }

    registerCanvas.width = width;
    registerCanvas.height = height;
    const context = registerCanvas.getContext("2d");
    context.drawImage(registerVideo, 0, 0, width, height);
    faceRegisterImage.value = registerCanvas.toDataURL("image/jpeg");
    captureRegisterFaceBtn.textContent = "Face Captured";
});

startRegisterCamera();
</script>

</body>
</html>
